apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-rs
  labels:
    team: Product
    version: 1.1.3
    environment: development
  annotations:
    description: This is for team product
    saintshiro.io/owner: "@fjr"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-withrsnew
  template:
    metadata:
      labels:
        app: nginx-withrsnew
    spec:
      containers:
        - name: nginx-withrsnew
          image: saintshiro16/my-nginx-site:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1

---

apiVersion: v1
kind: Service
metadata:
  name: service-nginx
spec:
  type: LoadBalancer
  selector:
    app: nginx-withrsnew
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
      nodePort: 30001